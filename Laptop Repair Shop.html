<!DOCTYPE html>
<html>
<head>
    <title>Laptop Repair Shop - Inquiry</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: Arial; max-width: 600px; margin: 50px auto; padding: 20px; }
        input, select, textarea { width: 100%; padding: 10px; margin: 10px 0; }
        button { background: blue; color: white; padding: 10px 20px; border: none; cursor: pointer; }
        #message { margin-top: 20px; padding: 10px; }
    </style>
</head>
<body>
    <h1>Laptop Repair Request</h1>
    <form id="inquiryForm">
        <input type="text" id="name" placeholder="Your Name" required>
        <input type="email" id="email" placeholder="Email" required>
        <input type="tel" id="phone" placeholder="Phone Number" required>
        <select id="serviceType">
            <option>Screen Repair</option>
            <option>Battery Replacement</option>
            <option>Water Damage</option>
            <option>Software Issue</option>
            <option>Other</option>
        </select>
        <textarea id="message" placeholder="Describe the issue..." rows="4"></textarea>
        <button type="submit">Send Inquiry</button>
    </form>
    <div id="message"></div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyybbM8y9SI88sojyNBFeYVA3f-hCqpRjYVT9ZSc7OQgDbVI12qK1g7CxdsrHUGERyMUg/exec";
        
        document.getElementById("inquiryForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            
            const data = {
                name: document.getElementById("name").value,
                email: document.getElementById("email").value,
                phone: document.getElementById("phone").value,
                serviceType: document.getElementById("serviceType").value,
                message: document.getElementById("message").value
            };
            
            try {
                const response = await fetch(WEB_APP_URL, {
                    method: "POST",
                    mode: "no-cors",  // This avoids CORS issues
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify(data)
                });
                
                document.getElementById("message").innerHTML = "✅ Inquiry sent! We'll contact you soon.";
                document.getElementById("inquiryForm").reset();
            } catch(error) {
                document.getElementById("message").innerHTML = "❌ Error. Please try again.";
            }
        });
    </script>
</body>
</html>
